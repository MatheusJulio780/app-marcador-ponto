<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub Icaphi</title>
    
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/128/2333/2333390.png" type="image/png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <style>
        :root {
            --bg: #e0e5ec; --text: #31344b; --shadow-light: #ffffff; --shadow-dark: #a3b1c6;
            --accent: #00adb5; --overlay: rgba(224, 229, 236, 0.85); --danger: #ff4d4d; --warning: #ff9800;
        }

        [data-theme="dark"] {
            --bg: #1e2125; --text: #e0e5ec; --shadow-light: #2d3138; --shadow-dark: #0f1113;
            --accent: #00d2d3; --overlay: rgba(30, 33, 37, 0.90);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: background 0.3s, color 0.3s, box-shadow 0.3s; }

        body {
            background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            min-height: 100vh; padding: 160px 1rem 2rem 1rem;
        }

        .top-bar {
            position: fixed; top: 0; left: 0; width: 100%; padding: 1.5rem 2rem; display: grid;
            grid-template-columns: 1fr auto 1fr; align-items: center; z-index: 1000;
            background: var(--bg);
        }

        .status-group { display: flex; gap: 1rem; justify-self: start; }
        .status-item {
            display: flex; align-items: center; gap: 0.5rem; padding: 0.8rem 1.2rem; border-radius: 12px; font-weight: 600;
            background: var(--bg); box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
        }

        .clock-wrapper {
            justify-self: center; display: flex; align-items: center; gap: 0.2rem; padding: 0.8rem 1.5rem;
            border-radius: 16px; background: var(--bg); box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
            font-size: 1.5rem; font-weight: 700; color: var(--accent);
        }
        .time-block { display: flex; overflow: hidden; height: 1.8rem; line-height: 1.8rem; }
        .digit { display: inline-block; width: 1ch; text-align: center; }
        .digit.animate { animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes slideUp { 0% { transform: translateY(100%); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        .colon { margin: 0 2px; }

        .controls-group { justify-self: end; display: flex; gap: 1rem; }
        .icon-btn {
            width: 50px; height: 50px; border-radius: 50%; background: var(--bg); display: flex; align-items: center; justify-content: center;
            cursor: pointer; border: none; color: var(--text); box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light);
        }
        .icon-btn:active { box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light); }

        .header { text-align: center; margin-bottom: 3rem; }
        .app-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 2.5rem; width: 100%; max-width: 900px; }
        
        .app-card {
            background: var(--bg); padding: 2rem; border-radius: 30px; display: flex; flex-direction: column; align-items: center; cursor: pointer;
            box-shadow: 10px 10px 20px var(--shadow-dark), -10px -10px 20px var(--shadow-light);
        }
        .app-card:hover { color: var(--accent); transform: translateY(-3px); }
        .app-card:active { transform: translateY(0); box-shadow: inset 6px 6px 12px var(--shadow-dark), inset -6px -6px 12px var(--shadow-light); }
        .icon { font-size: 3rem; margin-bottom: 1rem; color: inherit; }

        /* Modais Base */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--overlay); display: none; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(8px); }
        .modal-content { background: var(--bg); padding: 2.5rem; border-radius: 30px; box-shadow: 20px 20px 40px var(--shadow-dark), -20px -20px 40px var(--shadow-light); text-align: center; max-width: 450px; width: 90%; max-height: 90vh; overflow-y: auto; }
        .modal-buttons { display: flex; flex-direction: column; gap: 1rem; margin-top: 1.5rem; }
        
        .btn { padding: 1rem; border-radius: 12px; border: none; background: var(--bg); color: var(--text); font-weight: 600; cursor: pointer; box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light); }
        .btn:hover { color: var(--accent); box-shadow: 8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light); }
        .btn:active { box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light); }
        .btn-danger { color: var(--danger); }

        /* Gerenciador de Apps */
        .input-group { margin-bottom: 1rem; text-align: left; }
        .input-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; opacity: 0.8; }
        .form-input, .form-select {
            width: 100%; padding: 1rem; border-radius: 12px; border: none; background: var(--bg); color: var(--text); outline: none;
            box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light); font-family: 'Inter';
        }
        
        .app-list { margin-top: 2rem; display: flex; flex-direction: column; gap: 1rem; }
        .app-list-item {
            display: flex; justify-content: space-between; align-items: center; padding: 1rem; border-radius: 12px;
            background: var(--bg); box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
        }
        .app-info { display: flex; align-items: center; gap: 0.5rem; text-align: left; font-size: 0.9rem; font-weight: 600;}
        .app-controls { display: flex; gap: 0.5rem; }
        .mini-btn {
            width: 35px; height: 35px; border-radius: 8px; border: none; background: var(--bg); color: var(--text); cursor: pointer;
            box-shadow: 2px 2px 5px var(--shadow-dark), -2px -2px 5px var(--shadow-light); display: flex; align-items: center; justify-content: center;
        }
        .mini-btn:active { box-shadow: inset 2px 2px 5px var(--shadow-dark), inset -2px -2px 5px var(--shadow-light); }

        .warning-text { color: var(--warning); font-size: 0.9rem; margin-top: 1rem; font-weight: 600; display: none; padding: 1rem; border-radius: 10px; box-shadow: inset 2px 2px 5px var(--shadow-dark), inset -2px -2px 5px var(--shadow-light); }
        
        #iframe-container { width: 95%; height: 90%; max-width: 1400px; background: var(--bg); border-radius: 24px; padding: 1.5rem; box-shadow: 20px 20px 60px var(--shadow-dark), -20px -20px 60px var(--shadow-light); position: relative; display: flex; flex-direction: column; }
        .iframe-wrapper { width: 100%; height: 100%; border-radius: 16px; box-shadow: inset 8px 8px 16px var(--shadow-dark), inset -8px -8px 16px var(--shadow-light); padding: 10px; }
        iframe { width: 100%; height: 100%; border-radius: 12px; border: none; background: var(--bg); }
        .close-iframe { position: absolute; top: -20px; right: -20px; width: 50px; height: 50px; border-radius: 50%; background: var(--bg); color: var(--danger); display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; border: none; z-index: 10; box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light); }
        .close-iframe:active { box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light); }

        /* =========================================
           NOVAS REGRAS DE RESPONSIVIDADE (MOBILE)
           ========================================= */
        @media (max-width: 850px) {
            body { padding-top: 180px; }
            
            /* Reestrutura a Top Bar para usar 2 linhas e 2 colunas */
            .top-bar {
                grid-template-columns: 1fr 1fr;
                grid-template-areas: 
                    "status controls"
                    "clock clock";
                gap: 1.2rem;
                padding: 1rem;
            }

            .status-group { grid-area: status; justify-self: start; }
            .controls-group { grid-area: controls; justify-self: end; }
            
            /* Relógio assume 100% da largura na segunda linha */
            .clock-wrapper { 
                grid-area: clock; 
                width: 100%; 
                justify-content: center; 
                padding: 1rem;
            }

            /* Reduz um pouco os itens de status para caber telas pequenas */
            .status-item { padding: 0.6rem 0.8rem; font-size: 0.8rem; }
        }

        @media (max-width: 480px) {
            /* Força os aplicativos a ficarem em 1 coluna ou 2 colunas estreitas dependendo da tela */
            .app-grid { grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 1.5rem; }
            .app-card { padding: 1.5rem 1rem; }
            .icon { font-size: 2.5rem; }
            
            /* Empilha Data e Temperatura caso a tela seja minúscula */
            .status-group { flex-direction: column; gap: 0.5rem; align-items: flex-start; }
            .controls-group { flex-direction: column; gap: 0.5rem; }
            .top-bar { align-items: flex-start; }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="status-group">
            <div class="status-item"><span class="material-symbols-outlined">calendar_today</span><span id="currentDate">--/--/----</span></div>
            <div class="status-item"><span class="material-symbols-outlined">thermostat</span><span id="currentTemp">--°C</span></div>
        </div>
        
        <div class="clock-wrapper">
            <div class="time-block" id="hours"><span class="digit" id="h1">0</span><span class="digit" id="h2">0</span></div><span class="colon">:</span>
            <div class="time-block" id="minutes"><span class="digit" id="m1">0</span><span class="digit" id="m2">0</span></div><span class="colon">:</span>
            <div class="time-block" id="seconds"><span class="digit" id="s1">0</span><span class="digit" id="s2">0</span></div>
        </div>

        <div class="controls-group">
            <button class="icon-btn" onclick="openManager()" title="Gerenciar Apps">
                <span class="material-symbols-outlined">app_registration</span>
            </button>
            <button class="icon-btn" onclick="toggleTheme()" title="Alternar Tema">
                <span class="material-symbols-outlined" id="themeIcon">dark_mode</span>
            </button>
        </div>
    </div>

    <div class="header">
        <h1>Icaphi Hub</h1>
        <p>Selecione o módulo operacional</p>
    </div>

    <div class="app-grid" id="appGridContainer"></div>

    <div id="choiceModal" class="modal" onclick="closeModal(event, 'choiceModal')">
        <div class="modal-content">
            <h2 id="modalTitle">Sistema</h2>
            <div class="modal-buttons">
                <button class="btn" onclick="goToLink()">Ir para (Nova Aba)</button>
                <button class="btn" id="btnQuickView" onclick="openQuickView()">Abrir Rápido</button>
            </div>
            <div id="restrictedWarning" class="warning-text">O provedor bloqueia visualização interna. Use "Ir para".</div>
        </div>
    </div>

    <div id="iframeModal" class="modal">
        <div id="iframe-container">
            <button class="close-iframe" onclick="closeIframe()"><span class="material-symbols-outlined">close</span></button>
            <div class="iframe-wrapper"><iframe id="appIframe" src=""></iframe></div>
        </div>
    </div>

    <div id="managerModal" class="modal" onclick="closeModal(event, 'managerModal')">
        <div class="modal-content">
            <h2>Gerenciar Sistemas</h2>
            <p style="font-size: 0.8rem; margin-bottom: 1.5rem; opacity: 0.7;">Adicione links web ou caminhos locais (ex: C:\apps\app.exe)</p>
            
            <div class="input-group">
                <label>Nome do Sistema</label>
                <input type="text" id="appName" class="form-input" placeholder="Ex: Calculadora">
            </div>
            <div class="input-group">
                <label>Ícone (Material Symbols)</label>
                <input type="text" id="appIcon" class="form-input" placeholder="Ex: calculate ou route">
            </div>
            <div class="input-group">
                <label>Tipo de Execução</label>
                <select id="appType" class="form-select">
                    <option value="web">Link Web (Navegador/Painel)</option>
                    <option value="local">Caminho Local (Arquivo/Exe no PC)</option>
                </select>
            </div>
            <div class="input-group">
                <label>URL ou Caminho</label>
                <input type="text" id="appUrl" class="form-input" placeholder="https://... ou C:\...">
            </div>

            <button class="btn" style="width: 100%; color: var(--accent);" onclick="addApp()">+ Adicionar Sistema</button>

            <div class="app-list" id="appListContainer">
                </div>
        </div>
    </div>

    <script>
        // -----------------------------------------
        // 1. BANCO DE DADOS E RENDERIZAÇÃO (CRUD)
        // -----------------------------------------
        const defaultApps = [
            { id: 1, title: 'Painel', icon: 'settings_input_component', url: 'https://matheusjulio780.github.io/app-marcador-ponto/IcaphiPainel.html', type: 'web' },
            { id: 2, title: 'KMs', icon: 'route', url: 'https://matheusjulio780.github.io/app-marcador-ponto/IcaphiKMs.html', type: 'web' },
            { id: 3, title: 'Abastecimento', icon: 'ev_station', url: 'https://matheusjulio780.github.io/app-marcador-ponto/IcaphiAbastecimento.html', type: 'web' },
            { id: 4, title: 'Monitoramento', icon: 'folder_shared', url: 'https://1drv.ms/f/c/f6d4fa37c5517917/IgAXeVHFN_rUIID2kgAAAAAAAb5bWQ4m4d4gAXMQLb4MN4c?e=eHAeus', type: 'web' }
        ];

        // Carrega do LocalStorage ou usa o padrão
        let apps = JSON.parse(localStorage.getItem('icaphi_apps')) || defaultApps;

        function saveApps() {
            localStorage.setItem('icaphi_apps', JSON.stringify(apps));
            renderMainGrid();
            renderManagerList();
        }

        // Renderiza a grade principal de botões
        function renderMainGrid() {
            const grid = document.getElementById('appGridContainer');
            grid.innerHTML = '';
            apps.forEach(app => {
                grid.innerHTML += `
                    <div class="app-card" onclick="handleAppClick('${app.id}')">
                        <span class="material-symbols-outlined icon">${app.icon}</span>
                        <span style="font-weight: 600;">${app.title}</span>
                    </div>
                `;
            });
        }

        // Renderiza a lista dentro do pop-up de gerenciar
        function renderManagerList() {
            const list = document.getElementById('appListContainer');
            list.innerHTML = '';
            apps.forEach((app, index) => {
                list.innerHTML += `
                    <div class="app-list-item">
                        <div class="app-info">
                            <span class="material-symbols-outlined">${app.icon}</span> ${app.title}
                        </div>
                        <div class="app-controls">
                            <button class="mini-btn" onclick="moveApp(${index}, -1)" ${index === 0 ? 'disabled style="opacity:0.3"' : ''} title="Subir"><span class="material-symbols-outlined" style="font-size:18px">arrow_upward</span></button>
                            <button class="mini-btn" onclick="moveApp(${index}, 1)" ${index === apps.length - 1 ? 'disabled style="opacity:0.3"' : ''} title="Descer"><span class="material-symbols-outlined" style="font-size:18px">arrow_downward</span></button>
                            <button class="mini-btn btn-danger" onclick="deleteApp(${app.id})" title="Excluir"><span class="material-symbols-outlined" style="font-size:18px">delete</span></button>
                        </div>
                    </div>
                `;
            });
        }

        function addApp() {
            const title = document.getElementById('appName').value;
            const icon = document.getElementById('appIcon').value || 'widgets';
            const type = document.getElementById('appType').value;
            const url = document.getElementById('appUrl').value;

            if(!title || !url) { alert('Nome e URL/Caminho são obrigatórios.'); return; }

            const newApp = { id: Date.now(), title, icon, url, type };
            apps.push(newApp);
            saveApps();

            // Limpa os campos
            document.getElementById('appName').value = '';
            document.getElementById('appIcon').value = '';
            document.getElementById('appUrl').value = '';
        }

        function deleteApp(id) {
            apps = apps.filter(app => app.id !== id);
            saveApps();
        }

        function moveApp(index, direction) {
            const newIndex = index + direction;
            if (newIndex < 0 || newIndex >= apps.length) return;
            
            // Troca os elementos no Array
            const temp = apps[index];
            apps[index] = apps[newIndex];
            apps[newIndex] = temp;
            saveApps();
        }

        // -----------------------------------------
        // 2. LÓGICA DE EXECUÇÃO (WEB VS LOCAL)
        // -----------------------------------------
        let currentUrl = '';

        function handleAppClick(appId) {
            // Acha o app clicado no array garantindo o tipo de dado
            const app = apps.find(a => a.id.toString() === appId.toString());
            if(!app) return;

            if (app.type === 'local') {
                // SE FOR LOCAL: Tenta usar a ponte do Electron (ver Fase 2).
                if (window.electronAPI) {
                    window.electronAPI.openLocalPath(app.url);
                } else {
                    alert(`O navegador bloqueou a execução do arquivo local:\n${app.url}\n\nPara executar arquivos do PC, você precisa compilar este HTML usando o Electron (siga as instruções do tutorial Fase 2).`);
                }
            } else {
                // SE FOR WEB: Abre o modal normal
                openChoiceModal(app.title, app.url);
            }
        }

        function openManager() { renderManagerList(); document.getElementById('managerModal').style.display = 'flex'; }

        // [Todo o JS anterior de Relógio, Clima, Modais, Iframe mantidos intactos]
        function openChoiceModal(title, url) {
            currentUrl = url;
            document.getElementById('modalTitle').innerText = title;
            const isRestrictedDomain = url.includes('1drv.ms') || url.includes('onedrive.live.com');
            if (isRestrictedDomain) {
                document.getElementById('btnQuickView').style.display = 'none';
                document.getElementById('restrictedWarning').style.display = 'block';
            } else {
                document.getElementById('btnQuickView').style.display = 'block';
                document.getElementById('restrictedWarning').style.display = 'none';
            }
            document.getElementById('choiceModal').style.display = 'flex';
        }

        function closeModal(e, id) { if (e.target.id === id) document.getElementById(id).style.display = 'none'; }
        function goToLink() { window.open(currentUrl, '_blank'); document.getElementById('choiceModal').style.display = 'none'; }
        function openQuickView() { document.getElementById('choiceModal').style.display = 'none'; document.getElementById('appIframe').src = currentUrl; document.getElementById('iframeModal').style.display = 'flex'; }
        function closeIframe() { document.getElementById('iframeModal').style.display = 'none'; document.getElementById('appIframe').src = ''; }

        function updateDigit(id, newValue) { const el = document.getElementById(id); if (el.innerText !== newValue) { el.innerText = newValue; el.classList.remove('animate'); void el.offsetWidth; el.classList.add('animate'); } }
        function updateTime() { const now = new Date(); const dateOptions = { day: '2-digit', month: 'short', year: 'numeric' }; document.getElementById('currentDate').innerText = now.toLocaleDateString('pt-BR', dateOptions); const h = String(now.getHours()).padStart(2, '0'); const m = String(now.getMinutes()).padStart(2, '0'); const s = String(now.getSeconds()).padStart(2, '0'); updateDigit('h1', h[0]); updateDigit('h2', h[1]); updateDigit('m1', m[0]); updateDigit('m2', m[1]); updateDigit('s1', s[0]); updateDigit('s2', s[1]); }
        setInterval(updateTime, 1000); updateTime();

        async function fetchWeather(lat, lon) { try { const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`); const data = await response.json(); if(data && data.current_weather) { document.getElementById('currentTemp').innerText = `${Math.round(data.current_weather.temperature)}°C`; } } catch(e) { document.getElementById('currentTemp').innerText = "--°C"; } }
        function initWeather() { if (navigator.geolocation) { navigator.geolocation.getCurrentPosition( (pos) => fetchWeather(pos.coords.latitude, pos.coords.longitude), (err) => fetchWeather(-22.7856, -43.3117) ); } else { fetchWeather(-22.7856, -43.3117); } }
        initWeather();

        function initTheme() { const savedTheme = localStorage.getItem('theme') || 'light'; document.documentElement.setAttribute('data-theme', savedTheme); document.getElementById('themeIcon').innerText = savedTheme === 'light' ? 'dark_mode' : 'light_mode'; }
        function toggleTheme() { const target = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light'; document.documentElement.setAttribute('data-theme', target); localStorage.setItem('theme', target); document.getElementById('themeIcon').innerText = target === 'light' ? 'dark_mode' : 'light_mode'; }
        
        // Inicia a aplicação
        initTheme();
        renderMainGrid();
    </script>
</body>
</html>
