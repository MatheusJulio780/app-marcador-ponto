<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Icaphi Hub</title>
    
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/11529/11529094.png">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/11529/11529094.png">
    
    <meta name="theme-color" content="#020617">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

    <style>
        :root {
            --bg-base: #020617; 
            --text-main: #f8fafc; 
            --text-muted: #94a3b8;
            --accent: #06b6d4; 
            --accent-glow: rgba(6, 182, 212, 0.4); 
            --accent-dark: #0891b2;
            --danger: #f43f5e; 
            
            /* Bubble 3D Colors */
            --bubble-highlight: rgba(255, 255, 255, 0.25);
            --bubble-shadow: rgba(0, 0, 0, 0.6);
            --bubble-bg: rgba(15, 23, 42, 0.4);
        }

        [data-theme="light"] {
            --bg-base: #f1f5f9; 
            --text-main: #0f172a; 
            --text-muted: #475569;
            --accent: #0ea5e9; 
            --accent-glow: rgba(14, 165, 233, 0.3); 
            --accent-dark: #0284c7;
            
            --bubble-highlight: rgba(255, 255, 255, 0.8);
            --bubble-shadow: rgba(0, 0, 0, 0.15);
            --bubble-bg: rgba(255, 255, 255, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-base); color: var(--text-main); min-height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; transition: background 0.3s; }

        /* --- BACKGROUND SUTIL --- */
        .liquid-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1;
            background: radial-gradient(circle at 10% 20%, rgba(6, 182, 212, 0.12), transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(59, 130, 246, 0.12), transparent 40%);
            animation: slowPan 25s infinite alternate linear;
        }
        @keyframes slowPan { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }

        /* BARRA SUPERIOR */
        .top-bar { position: relative; z-index: 1000; width: 100%; padding: 1.5rem 2rem; display: flex; justify-content: flex-end; align-items: center; }
        .icon-btn { width: 45px; height: 45px; border-radius: 50%; background: var(--bubble-bg); box-shadow: inset 2px 2px 5px var(--bubble-highlight), inset -2px -2px 5px var(--bubble-shadow), 0 5px 15px rgba(0,0,0,0.2); color: var(--text-main); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s; backdrop-filter: blur(5px); }
        .icon-btn:hover { background: var(--accent); color: #fff; transform: translateY(-3px) scale(1.05); box-shadow: 0 10px 20px var(--accent-glow); }

        .header { text-align: center; margin-top: 1vh; position: relative; z-index: 5; pointer-events: none;}
        .header h1 { font-size: 3.5rem; font-weight: 800; background: linear-gradient(135deg, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -1px; }

        /* --- BUBBLE FLOWER LAYOUT --- */
        .radial-container {
            position: relative; width: 100vw; flex-grow: 1; display: flex; justify-content: center; align-items: center;
        }
        
        .bubble, .center-hub {
            position: absolute;
            top: 50%; left: 50%;
            width: 140px; height: 140px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, var(--bubble-bg) 0%, transparent 80%), var(--bg-base);
            box-shadow: 
                inset 8px 8px 20px var(--bubble-highlight),
                inset -8px -8px 20px var(--bubble-shadow),
                0 15px 30px rgba(0,0,0,0.4);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            transform: translate(-50%, -50%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; overflow: hidden;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .bubble { animation: spiralIn 1s cubic-bezier(0.34, 1.56, 0.64, 1) backwards; }
        .center-hub { z-index: 50; animation: floatAnim 4s ease-in-out infinite alternate; }

        /* Flutuação Sutil Injetada via JS */
        @keyframes floatAnim {
            0% { transform: translate(-50%, calc(-50% - 6px)); }
            100% { transform: translate(-50%, calc(-50% + 6px)); }
        }

        @keyframes spiralIn {
            0% { transform: translate(-50%, -50%) scale(0) rotate(-180deg); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
        }

        /* --- ESTADO HOVER: O MORPHING --- */
        .bubble:hover, .center-hub:hover {
            width: 360px; height: 400px;
            border-radius: 32px; /* Morph para Card */
            z-index: 100;
            background: var(--bg-modal-glass);
            box-shadow: 
                inset 2px 2px 10px var(--bubble-highlight),
                inset -2px -2px 10px var(--bubble-shadow),
                0 30px 60px rgba(0,0,0,0.6),
                0 0 40px var(--accent-glow);
            animation: none !important; /* Trava a flutuação ao abrir */
            transform: translate(-50%, -50%) !important;
        }

        /* Conteúdo Minimizado */
        .bubble-mini {
            position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; height: 100%; transition: opacity 0.3s ease; opacity: 1; pointer-events: none;
        }
        .bubble:hover .bubble-mini, .center-hub:hover .bubble-mini { opacity: 0; }
        
        .bubble-icon { font-size: 3.5rem; color: var(--accent); filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); margin-bottom: 0.5rem; }
        
        /* FIX: Texto saindo da borda */
        .bubble-title-mini { 
            font-weight: 700; font-size: 0.85rem; color: var(--text-main); 
            text-align: center; line-height: 1.2; 
            padding: 0 15px; width: 100%; word-break: break-word; 
        }

        /* Conteúdo Expandido */
        .bubble-full {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 2rem;
            display: flex; flex-direction: column; opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease 0.2s;
        }
        .bubble:hover .bubble-full, .center-hub:hover .bubble-full { opacity: 1; pointer-events: auto; }

        .full-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; border-bottom: 1px dashed var(--border-strong); padding-bottom: 1rem;}
        .full-header .material-symbols-outlined { font-size: 2.5rem; color: var(--accent); }
        .full-header h3 { font-size: 1.4rem; font-weight: 800; }
        
        .full-content { flex-grow: 1; overflow-y: auto; overflow-x: hidden; padding-right: 5px;}
        .full-content::-webkit-scrollbar { width: 4px; }
        .full-content::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }

        .action-btn { width: 100%; padding: 1rem; margin-top: 1rem; border-radius: 12px; background: var(--accent); color: #fff; border: none; font-weight: 700; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
        .action-btn:hover { background: var(--accent-dark); box-shadow: 0 5px 15px var(--accent-glow); transform: translateY(-2px); }

        /* Elementos Internos de Dados */
        .data-row { display: flex; justify-content: space-between; align-items: center; padding: 0.8rem 0; font-size: 0.9rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .data-highlight { font-weight: 700; color: #fff; }
        .data-tag { background: rgba(6, 182, 212, 0.2); color: var(--accent); padding: 4px 8px; border-radius: 8px; font-size: 0.8rem; font-weight: 700; border: 1px solid rgba(6, 182, 212, 0.3);}
        
        .tank-bar-bg { width: 100%; height: 14px; background: rgba(0,0,0,0.3); border-radius: 10px; margin-top: 8px; overflow: hidden; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); }
        .tank-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent-dark), var(--accent)); width: 0%; border-radius: 10px; transition: width 1.5s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: 0 0 10px var(--accent-glow);}

        /* --- CLIMA & ANIMAÇÕES (LEVES) --- */
        .weather-anim-box { height: 80px; display: flex; justify-content: center; align-items: center; margin-bottom: 1rem; transform: scale(1.2);}
        .anim-sun { width: 45px; height: 45px; background: #fbbf24; border-radius: 50%; box-shadow: 0 0 25px #fbbf24; animation: pulseSun 2s infinite alternate; }
        @keyframes pulseSun { 0% { transform: scale(1); } 100% { transform: scale(1.15); box-shadow: 0 0 40px #fbbf24; } }
        
        .anim-rain { position: relative; width: 60px; height: 50px; }
        .cloud { width: 60px; height: 22px; background: #94a3b8; border-radius: 20px; position: absolute; top: 0; z-index: 2; box-shadow: inset -2px -2px 5px rgba(0,0,0,0.3);}
        .drop { position: absolute; width: 2px; height: 10px; background: #38bdf8; top: 20px; animation: rainDrop 0.8s linear infinite; }
        .drop:nth-child(1) { left: 15px; animation-delay: 0.1s; } .drop:nth-child(2) { left: 30px; animation-delay: 0.4s; } .drop:nth-child(3) { left: 45px; animation-delay: 0.2s; }
        @keyframes rainDrop { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(25px); opacity: 0; } }

        .anim-cloud { width: 60px; height: 22px; background: #cbd5e1; border-radius: 20px; position: relative; box-shadow: inset -2px -2px 5px rgba(0,0,0,0.2), 0 5px 15px rgba(0,0,0,0.2); animation: floatCloud 3s infinite alternate ease-in-out; }
        .anim-cloud::before { content: ''; position: absolute; width: 30px; height: 30px; background: #cbd5e1; border-radius: 50%; top: -15px; left: 10px; }
        @keyframes floatCloud { 0% { transform: translateY(-3px); } 100% { transform: translateY(3px); } }

        @media (max-width: 768px) {
            .bubble:hover, .center-hub:hover { width: 90vw; height: 60vh; }
        }
    </style>
</head>
<body>

    <div class="liquid-bg"></div>

    <div class="top-bar">
        <button class="icon-btn" onclick="toggleTheme()" title="Modo Claro/Escuro"><span class="material-symbols-outlined" id="themeIcon">light_mode</span></button>
    </div>

    <div class="header">
        <h1>Icaphi Hub</h1>
        <p style="color: var(--text-muted); font-weight: 500;">Sistema Operacional Dinâmico</p>
    </div>

    <div class="radial-container" id="bubble-container">
        
        <div class="center-hub" id="center-hub">
            <div class="bubble-mini">
                <span id="mainClock" style="font-size: 2.2rem; font-weight: 800; color: var(--accent); filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));">00:00</span>
                <span id="weatherIconSmall" class="material-symbols-outlined" style="margin-top: 5px; color: var(--text-muted); font-size: 1.4rem;">thermostat</span>
            </div>
            
            <div class="bubble-full" style="align-items: center; justify-content: center; text-align: center; padding: 2rem;">
                <h3 id="fullDateText" style="color: var(--accent); font-size: 1.3rem; margin-bottom: 5px; font-weight: 800;">Buscando Data...</h3>
                <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem;">Semana <strong id="weekNumber" style="color:var(--text-main);">--</strong></p>

                <div class="weather-anim-box" id="weatherAnimation"></div>
                
                <h4 id="weatherDesc" style="font-size: 1.4rem; font-weight: 700; margin-bottom: 1.5rem; color: var(--text-main);">Atualizando...</h4>

                <div style="display: flex; gap: 20px; font-size: 1rem; width: 100%; justify-content: center;">
                    <div style="background: rgba(0,0,0,0.2); padding: 10px 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);">
                        <span style="color:#38bdf8; display:block; font-size:0.8rem; font-weight:700;">MÍNIMA</span> 
                        <strong id="tempMin" style="font-size:1.2rem;">--</strong>
                    </div>
                    <div style="background: rgba(0,0,0,0.2); padding: 10px 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);">
                        <span style="color:#ef4444; display:block; font-size:0.8rem; font-weight:700;">MÁXIMA</span> 
                        <strong id="tempMax" style="font-size:1.2rem;">--</strong>
                    </div>
                </div>
            </div>
        </div>
        
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 1. FIREBASE CONFIG
        const configAbast = {
            apiKey: "AIzaSyBvbLbyI4ho-X9buW5j6atXvehnoZM0qXM",
            authDomain: "gestao-abastecimento.firebaseapp.com",
            projectId: "gestao-abastecimento",
            storageBucket: "gestao-abastecimento.firebasestorage.app",
            messagingSenderId: "462798250454",
            appId: "1:462798250454:web:f56cf50bd2c0223459c477"
        };
        const appAbast = initializeApp(configAbast, "abastecimento");
        const dbAbast = getFirestore(appAbast);

        const configKm = {
            apiKey: "AIzaSyA3TviypEfSWilOz4_3TqJP1JwB7LIa49U",
            authDomain: "marcador-ponto-digital.firebaseapp.com",
            projectId: "marcador-ponto-digital",
            storageBucket: "marcador-ponto-digital.firebasestorage.app",
            messagingSenderId: "774324665760",
            appId: "1:774324665760:web:2c4e9c42eaaa347e32b8c5"
        };
        const appKm = initializeApp(configKm, "kms");
        const dbKm = getFirestore(appKm);

        // 2. DADOS DOS MÓDULOS
        const apps = [
            { id: 1, title: 'Painel Geral', icon: 'settings_input_component', url: 'https://matheusjulio780.github.io/app-marcador-ponto/IcaphiPainel.html' },
            { id: 2, title: 'Gestão de KMs', icon: 'route', url: 'https://matheusjulio780.github.io/app-marcador-ponto/IcaphiKMs.html' },
            { id: 3, title: 'Abastecimento', icon: 'ev_station', url: 'https://matheusjulio780.github.io/app-marcador-ponto/IcaphiAbastecimento.html' },
            { id: 4, title: 'Monitoramento', icon: 'monitoring', url: '#' },
            { id: 5, title: 'Relatórios', icon: 'summarize', url: '#' }
        ];

        // 3. RENDERIZAÇÃO DA FLOR & FLUTUAÇÃO
        function renderBubbles() {
            const container = document.getElementById('bubble-container');
            const radius = window.innerWidth < 768 ? 130 : 230; 
            const angleStep = (2 * Math.PI) / apps.length;

            apps.forEach((app, index) => {
                const angle = (index * angleStep) - (Math.PI / 2); 
                const offsetX = Math.cos(angle) * radius;
                const offsetY = Math.sin(angle) * radius;
                
                // O delay da espiral
                const entryDelay = index * 0.15; 
                // O delay aleatório da flutuação contínua (para não mexerem iguais)
                const floatDuration = 3 + Math.random() * 2; 

                let contentHTML = `<div style="text-align:center; padding: 1rem; color:var(--text-muted);">Módulo em operação.</div>`;
                
                if(app.id === 2) {
                    contentHTML = `<div id="kms-list"><div style="text-align:center; padding: 2rem;">Sincronizando Firebase...</div></div>`;
                } else if(app.id === 3) {
                    contentHTML = `
                        <div style="background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 16px; margin-bottom: 1rem; border: 1px solid rgba(255,255,255,0.05);">
                            <div style="display:flex; justify-content:space-between; font-weight:800;">
                                <span id="abast-estoque">-- L</span> <span style="color:var(--text-muted);" id="abast-cap">/ -- L</span>
                            </div>
                            <div class="tank-bar-bg"><div class="tank-bar-fill" id="abast-bar"></div></div>
                            <div style="font-size:0.85rem; color:var(--accent); margin-top:8px; font-weight:700;" id="abast-hoje">Abastecido Hoje: -- L</div>
                        </div>
                        <h4 style="font-size:0.9rem; color:var(--text-muted); margin-bottom:0.5rem; text-transform:uppercase;">Últimos Registros</h4>
                        <div id="abast-list"><div style="text-align:center; padding: 1rem;">Sincronizando...</div></div>`;
                }

                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                bubble.style.marginTop = `${offsetY}px`;
                bubble.style.marginLeft = `${offsetX}px`;
                
                // Injeta Animação de Entrada
                bubble.style.animation = `spiralIn 1s cubic-bezier(0.34, 1.56, 0.64, 1) backwards ${entryDelay}s`;

                // Após a entrada, injeta a flutuação orgânica sutil
                setTimeout(() => {
                    // Impede de sobrescrever se o usuário já estiver com o mouse em cima
                    if(!bubble.matches(':hover')) {
                        bubble.style.animation = `floatAnim ${floatDuration}s ease-in-out infinite alternate`;
                    }
                }, (1000 + (entryDelay * 1000)));

                bubble.innerHTML = `
                    <div class="bubble-mini">
                        <span class="material-symbols-outlined bubble-icon">${app.icon}</span>
                        <span class="bubble-title-mini">${app.title.replace(' ', '<br>')}</span>
                    </div>
                    <div class="bubble-full">
                        <div class="full-header">
                            <span class="material-symbols-outlined">${app.icon}</span>
                            <h3>${app.title}</h3>
                        </div>
                        <div class="full-content">
                            ${contentHTML}
                        </div>
                        <button class="action-btn" onclick="window.open('${app.url}', '_blank')">
                            Acessar Módulo <span class="material-symbols-outlined">arrow_forward</span>
                        </button>
                    </div>
                `;

                container.appendChild(bubble);
                
                // Restaura a flutuação ao tirar o mouse
                bubble.addEventListener('mouseleave', () => {
                    bubble.style.animation = `floatAnim ${floatDuration}s ease-in-out infinite alternate`;
                });
            });

            fetchFirebaseData();
        }

        // 4. FETCH FIREBASE DATA
        async function fetchFirebaseData() {
            try {
                const confRef = doc(dbAbast, 'configuracoes', 'gerais');
                const confSnap = await getDoc(confRef);
                if(confSnap.exists()) {
                    const est = confSnap.data().estoqueTanque || 0;
                    const cap = confSnap.data().capacidadeTanque || 1; 
                    const perc = Math.min((est / cap) * 100, 100);
                    
                    document.getElementById('abast-estoque').innerText = est + ' L';
                    document.getElementById('abast-cap').innerText = '/ ' + cap + ' L';
                    const elBar = document.getElementById('abast-bar');
                    elBar.style.width = perc + '%';
                    if(perc < 20) elBar.style.background = 'linear-gradient(90deg, #991b1b, #ef4444)';
                }

                const qAbast = query(collection(dbAbast, 'abastecimentos'), orderBy('timestamp', 'desc'), limit(5));
                const abastSnap = await getDocs(qAbast);
                let htmlAbast = '';
                let litrosHoje = 0;
                const todayStr = new Date().toISOString().split('T')[0];

                abastSnap.forEach(d => {
                    const data = d.data();
                    if(data.timestamp && data.timestamp.startsWith(todayStr)) {
                        litrosHoje += parseFloat(data.litros || 0);
                    }
                    htmlAbast += `
                        <div class="data-row">
                            <div><span class="data-highlight">${data.placa || 'N/A'}</span> <span style="font-size:0.75rem; color:var(--text-muted); display:block;">${data.funcionario || ''}</span></div>
                            <div class="data-tag">${data.litros || 0} L</div>
                        </div>`;
                });

                document.getElementById('abast-hoje').innerText = `Abastecido Hoje: ${litrosHoje.toFixed(1)} L`;
                document.getElementById('abast-list').innerHTML = htmlAbast;

            } catch(e) { console.error("Erro Firebase Abast:", e); }

            try {
                const qKms = query(collection(dbKm, 'viagens'), orderBy('dataFimCelular', 'desc'), limit(15));
                const kmsSnap = await getDocs(qKms);
                
                let htmlKms = '';
                let countKms = 0;

                kmsSnap.forEach(d => {
                    const data = d.data();
                    if(data.status === 'finalizada' && countKms < 5) {
                        const kmRodado = (data.kmFim || 0) - (data.kmInicio || 0);
                        htmlKms += `
                            <div class="data-row">
                                <div><span class="data-highlight">${data.placa || 'N/A'}</span> <span style="font-size:0.75rem; color:var(--text-muted); display:block;">${data.nome || ''}</span></div>
                                <div class="data-tag">${kmRodado} KM</div>
                            </div>`;
                        countKms++;
                    }
                });

                document.getElementById('kms-list').innerHTML = htmlKms || '<div style="text-align:center; font-size:0.8rem;">Nenhuma viagem recente.</div>';

            } catch(e) { console.error("Erro Firebase KMs:", e); }
        }

        // 5. RELÓGIO & CLIMA
        function getWeekNumber(d) { d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate())); d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7)); const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1)); return Math.ceil((((d - yearStart) / 86400000) + 1)/7); }
        
        function updateClock() { 
            const now = new Date(); 
            document.getElementById('mainClock').innerText = now.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'}); 
            
            let dataFull = now.toLocaleDateString('pt-BR', { weekday: 'long', day: '2-digit', month: 'long' }); 
            document.getElementById('fullDateText').innerText = dataFull.charAt(0).toUpperCase() + dataFull.slice(1); 
            document.getElementById('weekNumber').innerText = getWeekNumber(now);
        }
        setInterval(updateClock, 1000); updateClock();

        async function fetchWeather() { 
            try { 
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=-22.7856&longitude=-43.3117&current_weather=true&daily=temperature_2m_max,temperature_2m_min&timezone=America%2FSao_Paulo`); 
                const data = await res.json(); 
                
                document.getElementById('tempMin').innerText = `${Math.round(data.daily.temperature_2m_min[0])}°C`; 
                document.getElementById('tempMax').innerText = `${Math.round(data.daily.temperature_2m_max[0])}°C`; 
                
                const code = data.current_weather.weathercode; 
                const animBox = document.getElementById('weatherAnimation'); 
                const desc = document.getElementById('weatherDesc'); 
                const iconSmall = document.getElementById('weatherIconSmall'); 
                
                if (code <= 3) { 
                    animBox.innerHTML = `<div class="anim-sun"></div>`; desc.innerText = "Céu Limpo"; iconSmall.innerText = "light_mode"; 
                } else if (code >= 51 && code <= 67 || code >= 80 && code <= 82) { 
                    animBox.innerHTML = `<div class="anim-rain"><div class="cloud"></div><div class="drop"></div><div class="drop"></div><div class="drop"></div></div>`; desc.innerText = "Chuvoso"; iconSmall.innerText = "rainy"; 
                } else if (code >= 95) { 
                    animBox.innerHTML = `<div class="anim-rain"><div class="cloud" style="background:#475569;"></div><div class="drop" style="background:#fbbf24; width:3px;"></div></div>`; desc.innerText = "Tempestade"; iconSmall.innerText = "thunderstorm"; 
                } else { 
                    animBox.innerHTML = `<div class="anim-cloud"></div>`; desc.innerText = "Nublado"; iconSmall.innerText = "cloud"; 
                } 
            } catch(e) { console.error("Erro na API de clima"); } 
        }

        window.toggleTheme = function() { 
            const isLight = document.documentElement.getAttribute('data-theme') === 'light'; 
            document.documentElement.setAttribute('data-theme', isLight ? 'dark' : 'light'); 
            document.getElementById('themeIcon').innerText = isLight ? 'light_mode' : 'dark_mode'; 
            localStorage.setItem('theme', isLight ? 'dark' : 'light'); 
        }

        function init() { 
            const saved = localStorage.getItem('theme') || 'dark'; 
            document.documentElement.setAttribute('data-theme', saved); 
            document.getElementById('themeIcon').innerText = saved === 'dark' ? 'light_mode' : 'dark_mode'; 
            
            renderBubbles();
            fetchWeather();
            
            window.addEventListener('resize', () => {
                const container = document.getElementById('bubble-container');
                const bubbles = container.querySelectorAll('.bubble');
                bubbles.forEach(b => b.remove()); 
                renderBubbles(); 
            });
        }

        init();
    </script>
</body>
</html>
